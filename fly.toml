app = "bmad-api"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  PYTHONPATH = "/app"
  DATABASE_PATH = "/app/data/bmad.db"
  ENV = "production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[mounts]
  source = "bmad_data"
  destination = "/app/data"
